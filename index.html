<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malaria Outbreak Intelligence Engine</title>
    <link rel="stylesheet" href="https://googleapis.com">
    <script src="https://jsdelivr.net"></script>
    <style>
        html, body { font-family: 'Inter', sans-serif; background-color: #f8fafc; color: #1e293b; margin: 0; padding: 0; }
        .wrapper { display: flex; min-height: 100vh; }
        .sidebar { width: 320px; background: #ffffff; border-right: 1px solid #e2e8f0; padding: 30px; box-sizing: border-box; }
        .sidebar h2 { font-size: 1.25rem; font-weight: 700; margin-bottom: 20px; color: #0f172a; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 0.85rem; font-weight: 600; color: #475569; margin-bottom: 8px; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; font-family: inherit; font-size: 0.95rem; }
        .submit-btn { width: 100%; padding: 14px; background: #1e293b; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 0.95rem; }
        .main-content { flex: 1; padding: 40px; box-sizing: border-box; overflow-y: auto; }
        .main-title { font-weight: 700; color: #1e293b; margin: 0 0 5px 0; font-size: 2rem; }
        .sub-caption { font-size: 1.05rem; color: #64748b; margin: 0 0 30px 0; }
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 30px; display: none; }
        .metric-card { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(10px); border-radius: 12px; padding: 20px; box-shadow: 0 4px 16px rgba(31, 38, 135, 0.06); border: 1px solid rgba(255,255,255,0.18); text-align: center; }
        .metric-title { font-size: 0.85rem; font-weight: 600; color: #64748b; text-transform: uppercase; }
        .metric-value { font-size: 2.25rem; font-weight: 700; color: #0f172a; margin-top: 10px; }
        .tabs-container { margin-top: 20px; display: none; }
        .tabs-header { display: flex; gap: 8px; border-bottom: 2px solid #e2e8f0; }
        .tab-button { background: #f1f5f9; border: none; border-radius: 8px 8px 0 0; padding: 12px 24px; font-weight: 600; color: #475569; cursor: pointer; }
        .tab-button.active { background: #1e293b; color: white; }
        .tab-content { display: none; background: white; padding: 25px; border-radius: 0 0 12px 12px; border: 1px solid #e2e8f0; border-top: none; }
        .tab-content.active { display: block; }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 12px 16px; border-bottom: 1px solid #e2e8f0; }
        th { background: #f8fafc; color: #475569; }
        .loading { display: none; font-size: 1.1rem; font-weight: 600; color: #475569; }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="sidebar">
            <h2>Search Parameters</h2>
            <div class="form-group">
                <label for="district">Enter District/Region Name</label>
                <input type="text" id="district" value="Kampala, Uganda">
            </div>
            <div class="form-group">
                <label for="targetDate">Target Analysis Date</label>
                <input type="date" id="targetDate">
            </div>
            <button class="submit-btn" onclick="runDiagnostic()">Run Diagnostic Scan</button>
        </div>

        <div class="main-content">
            <h1 class="main-title">🦟 Malaria Early-Warning Outbreak Intelligence Engine</h1>
            <p class="sub-caption">Predictive climate intelligence mapping horizons.</p>
            <div id="loadingText" class="loading">⏳ Processing telemetry arrays...</div>

            <div class="dashboard-grid" id="metricsGrid">
                <div class="metric-card"><div class="metric-title">Outbreak Risk Index</div><div class="metric-value" id="riskVal" style="color: #ef4444;">0%</div></div>
                <div class="metric-card"><div class="metric-title">Calculated Elevation</div><div class="metric-value" id="elevVal">0m</div></div>
                <div class="metric-card"><div class="metric-title">Data Mode</div><div class="metric-value" id="modeVal" style="font-size:1.1rem; padding-top:10px;">--</div></div>
            </div>

            <div class="tabs-container" id="tabsArea">
                <div class="tabs-header">
                    <button class="tab-button active" onclick="switchTab(event, 'chartTab')">Climate Metrics</button>
                    <button class="tab-button" onclick="switchTab(event, 'auditTab')">Audit History Trail</button>
                </div>
                <div id="chartTab" class="tab-content active"><canvas id="climateChart" style="max-height: 380px;"></canvas></div>
                <div id="auditTab" class="tab-content">
                    <table>
                        <thead><tr><th>Timestamp</th><th>Target</th><th>Resolved Address</th><th>Date</th><th>Risk</th></tr></thead>
                        <tbody id="auditBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('targetDate').valueAsDate = new Date();
        let activeChart = null;

        function switchTab(e, id) {
            document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            e.currentTarget.classList.add('active');
            document.getElementById(id).classList.add('active');
        }

        async function runDiagnostic() {
            const district = document.getElementById('district').value;
            const target_date = document.getElementById('targetDate').value;
            document.getElementById('loadingText').style.display = 'block';
            
            try {
                const response = await fetch('/api/diagnose', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ district, target_date })
                });
                const data = await response.json();

                document.getElementById('riskVal').innerText = data.risk_index + '%';
                document.getElementById('elevVal').innerText = data.elevation + 'm';
                document.getElementById('modeVal').innerText = data.data_source;
                
                document.getElementById('loadingText').style.display = 'none';
                document.getElementById('metricsGrid').style.display = 'grid';
                document.getElementById('tabsArea').style.display = 'block';

                if (activeChart) activeChart.destroy();
                activeChart = new Chart(document.getElementById('climateChart').getContext('2d'), {
                    type: 'line',
                    data: {
                        labels: data.chart_data.labels,
                        datasets: [{ label: 'Mean Temp (°F)', data: data.chart_data.temperatures, borderColor: '#3b82f6', tension: 0.2 }]
                    }
                });

                const tbody = document.getElementById('auditBody');
                tbody.innerHTML = '';
                data.history.forEach(log => {
                    tbody.innerHTML += `<tr><td>${log.timestamp}</td><td><b>${log.district}</b></td><td>${log.resolved_address}</td><td>${log.target_date}</td><td>${log.calculated_risk}</td></tr>`;
                });
            } catch { document.getElementById('loadingText').style.display = 'none'; alert('Error executing check.'); }
        }
    </script>
</body>
</html>
