<script>
        // ==========================================
        // 1. GLOBAL STATE & CONFIGURATION
        // ==========================================
        let chartInstance = null;
        let activeDataCache = null;
        let globalThresholdValue = 65; // Default outbreak threshold (%)
        const sessionLogs = [];

        // Dynamic API Base URL — points to Flask/FastAPI backend running locally or hosted
        const API_BASE_URL = window.location.origin.includes('http') 
            ? window.location.origin 
            : 'http://127.0.0.1:5000';

        // ==========================================
        // 2. INITIALIZATION & EVENT LISTENERS
        // ==========================================
        document.addEventListener('DOMContentLoaded', () => {
            setupTabNavigation();
            setupThresholdSlider();
            
            // Auto-bind form submission if form exists
            const telemetryForm = document.getElementById('telemetryForm');
            if (telemetryForm) {
                telemetryForm.addEventListener('submit', handleFormSubmission);
            }
        });

        function setupTabNavigation() {
            const tabs = document.querySelectorAll('[data-tab-target]');
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    const targetId = tab.getAttribute('data-tab-target');
                    
                    // Toggle active styles on tabs
                    tabs.forEach(t => {
                        t.classList.remove('border-emerald-600', 'text-emerald-600', 'active');
                        t.classList.add('border-transparent', 'text-slate-500');
                    });
                    tab.classList.add('border-emerald-600', 'text-emerald-600', 'active');

                    // Toggle visibility of panels
                    document.querySelectorAll('.tab-panel').forEach(panel => {
                        panel.classList.add('hidden');
                    });
                    const activePanel = document.getElementById(targetId);
                    if (activePanel) activePanel.classList.remove('hidden');
                });
            });
        }

        function setupThresholdSlider() {
            const slider = document.getElementById('thresholdSlider');
            const display = document.getElementById('thresholdDisplay');
            if (!slider) return;

            slider.addEventListener('input', (e) => {
                globalThresholdValue = parseFloat(e.target.value);
                if (display) display.textContent = `${globalThresholdValue}%`;
                
                // Re-evaluate current dataset dynamically without re-fetching
                if (activeDataCache) {
                    processTelemetryResponse(activeDataCache);
                }
            });
        }

        // ==========================================
        // 3. PYTHON BACKEND INTEGRATION (FETCH)
        // ==========================================
        async function handleFormSubmission(event) {
            if (event) event.preventDefault();

            const locationInput = document.getElementById('locationInput')?.value || 'Soroti, Uganda';
            const windowInput = document.getElementById('windowInput')?.value || '14_days';
            const loadingSpinner = document.getElementById('loadingSpinner');

            if (loadingSpinner) loadingSpinner.classList.remove('hidden');

            try {
                // Call Python REST API endpoint
                const response = await fetch(`${API_BASE_URL}/api/analyze`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        location: locationInput,
                        time_window: windowInput,
                        threshold: globalThresholdValue
                    })
                });

                if (!response.ok) {
                    throw new Error(`Server returned HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                activeDataCache = data;

                // Log session telemetry audit
                sessionLogs.unshift({
                    time: new Date().toLocaleTimeString(),
                    target: data.location?.address || locationInput,
                    window: windowInput.replace('_', ' '),
                    risk: data.assessment?.max_future_risk ?? 0
                });

                processTelemetryResponse(data);
                updateAuditTableUI();

            } catch (error) {
                console.error("Telemetry Pipeline Failure:", error);
                showErrorMessage(`Pipeline Connection Error: ${error.message}. Verify that your Python backend server is running.`);
            } finally {
                if (loadingSpinner) loadingSpinner.classList.add('hidden');
            }
        }

        // ==========================================
        // 4. UI RENDERERS & PIPELINE PROCESSORS
        // ==========================================
        function processTelemetryResponse(payload) {
            if (!payload || !payload.assessment) return;

            const assessment = payload.assessment;
            const maxRisk = assessment.max_future_risk ?? 0;
            const isHighRisk = maxRisk >= globalThresholdValue;

            // Update Header & Summary Badges
            updateSummaryCards(payload);

            // Generate Reason Breakdown
            generateExplanatoryReasons(assessment, globalThresholdValue);

            // Render Table Ledger
            buildLedgerTable(payload.horizon_dataframe || []);

            // Render Chart.js Trend
            renderHorizonChart(payload.horizon_dataframe || [], isHighRisk);
        }

        function updateSummaryCards(payload) {
            const asm = payload.assessment || {};
            const metrics = asm.summary_metrics || {};
            const loc = payload.location || {};

            const locationEl = document.getElementById('locationHeader');
            const riskEl = document.getElementById('riskBadge');
            const tempEl = document.getElementById('metricTemp');
            const humEl = document.getElementById('metricHum');
            const rainEl = document.getElementById('metricRain');

            if (locationEl) locationEl.textContent = loc.address || 'Target Zone';
            if (riskEl) {
                riskEl.textContent = `${(asm.max_future_risk ?? 0).toFixed(1)}%`;
                riskEl.className = `text-2xl font-black ${asm.max_future_risk >= globalThresholdValue ? 'text-red-600' : 'text-emerald-600'}`;
            }
            if (tempEl) tempEl.textContent = metrics.Temperature ? `${metrics.Temperature.toFixed(1)} °F` : '--';
            if (humEl) humEl.textContent = metrics.Humidity ? `${metrics.Humidity.toFixed(1)} %` : '--';
            if (rainEl) rainEl.textContent = metrics.Accumulated_Rain ? `${metrics.Accumulated_Rain.toFixed(2)} in` : '--';
        }

        function generateExplanatoryReasons(assessment, threshold) {
            const container = document.getElementById('explanatoryReasonsContainer');
            if (!container) return;

            const maxRisk = assessment?.max_future_risk ?? 0;
            const metrics = assessment?.summary_metrics || {};

            let contentHtml = '';

            if (maxRisk >= threshold) {
                contentHtml += `
                <div class="py-2.5 text-slate-700">
                    <span class="font-semibold text-red-600">📊 Bound Boundary Breach:</span> 
                    Calculated transmission vector peak of <b>${maxRisk.toFixed(1)}%</b> exceeds your alert boundary set at <b>${threshold}%</b>.
                </div>`;
            } else {
                contentHtml += `
                <div class="py-2.5 text-slate-700">
                    <span class="font-semibold text-emerald-600">🛡️ Safe Operational Margin:</span> 
                    Transmission risk indices remain below the active trigger threshold of <b>${threshold}%</b>.
                </div>`;
            }

            // Drivers extracted from Python dictionary metrics
            if (metrics.Temperature) {
                contentHtml += `
                <div class="text-xs text-slate-500 mt-2 pt-2 border-t border-slate-100 space-y-1">
                    <div>• Thermal Optimal Range: <b>${metrics.Temperature.toFixed(1)}°F</b></div>
                    <div>• Moisture Vector Load: <b>${metrics.Humidity ? metrics.Humidity.toFixed(1) : '--'}% RH</b> | 
                    Rainfall Accumulation: <b>${metrics.Accumulated_Rain ? metrics.Accumulated_Rain.toFixed(2) : '0.00'} in</b></div>
                </div>`;
            }

            container.innerHTML = contentHtml;
        }

        function buildLedgerTable(dataframe) {
            const tbody = document.getElementById('ledgerTableBody');
            if (!tbody) return;

            if (!dataframe || !Array.isArray(dataframe) || dataframe.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="p-4 text-center text-slate-400">No trend rows returned from telemetry pipeline.</td></tr>`;
                return;
            }

            // Normalizes keys to match Pandas DataFrame outputs (.to_dict(orient='records'))
            tbody.innerHTML = dataframe.map(row => {
                const dateVal = row.date || row.Date || row.time || '--';
                const tempVal = row.temperature ?? row.Temperature ?? null;
                const humVal = row.humidity ?? row.Humidity ?? null;
                const rainVal = row.rain ?? row.Rain ?? row.Accumulated_Rain ?? null;
                const riskVal = row.risk ?? row.Risk ?? row.outbreak_risk ?? 0;

                return `
                <tr class="hover:bg-slate-50 transition border-b border-slate-100">
                    <td class="p-3.5 font-medium text-slate-800">${dateVal}</td>
                    <td class="p-3.5 text-slate-600">${tempVal !== null ? Number(tempVal).toFixed(1) + '°' : '--'}</td>
                    <td class="p-3.5 text-slate-600">${humVal !== null ? Number(humVal).toFixed(1) + '%' : '--'}</td>
                    <td class="p-3.5 text-slate-600">${rainVal !== null ? Number(rainVal).toFixed(2) + ' in' : '--'}</td>
                    <td class="p-3.5 font-bold ${riskVal >= globalThresholdValue ? 'text-red-600' : 'text-emerald-600'}">
                        ${Number(riskVal).toFixed(1)}%
                    </td>
                </tr>`;
            }).join('');
        }

        function renderHorizonChart(dataframe, isHighRisk) {
            const canvas = document.getElementById('horizonChart');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            
            // Clean up previous instance before re-drawing
            if (chartInstance) {
                chartInstance.destroy();
            }

            const labels = dataframe ? dataframe.map(d => d.date || d.Date || d.time || '') : [];
            const riskData = dataframe ? dataframe.map(d => d.risk ?? d.Risk ?? d.outbreak_risk ?? 0) : [];

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Outbreak Risk Index (%)',
                        data: riskData,
                        borderColor: isHighRisk ? '#ef4444' : '#10b981',
                        backgroundColor: isHighRisk ? 'rgba(239, 68, 68, 0.08)' : 'rgba(16, 185, 129, 0.08)',
                        fill: true,
                        tension: 0.35,
                        pointRadius: 3,
                        pointHoverRadius: 6,
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: (ctx) => ` Risk Level: ${ctx.parsed.y.toFixed(1)}%`
                            }
                        }
                    },
                    scales: {
                        x: { grid: { display: false } },
                        y: { beginAtZero: true, max: 100, grid: { color: '#f1f5f9' } }
                    }
                }
            });
        }

        function updateAuditTableUI() {
            const tbody = document.getElementById('auditTableBody');
            if (!tbody) return;

            if (!sessionLogs || sessionLogs.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="p-4 text-center text-slate-400">No telemetry session items cached.</td></tr>`;
                return;
            }

            tbody.innerHTML = sessionLogs.map(log => `
                <tr class="hover:bg-slate-50 border-b border-slate-100 text-xs">
                    <td class="p-2.5 font-mono text-slate-500">${log.time}</td>
                    <td class="p-2.5 font-medium text-slate-800">${log.target}</td>
                    <td class="p-2.5 text-slate-600">${log.window}</td>
                    <td class="p-2.5 font-bold ${log.risk >= globalThresholdValue ? 'text-red-600' : 'text-emerald-600'}">
                        ${Number(log.risk).toFixed(1)}%
                    </td>
                </tr>
            `).join('');
        }

        // ==========================================
        // 5. EXPORT & UTILITY FUNCTIONS
        // ==========================================
        function downloadReport() {
            if (!activeDataCache) {
                alert("Please execute an analysis request prior to exporting executive summaries.");
                return;
            }

            const loc = activeDataCache.location || {};
            const asm = activeDataCache.assessment || {};
            const metrics = asm.summary_metrics || {};
            const meta = activeDataCache.metadata || {};

            const reportContent = `====================================================
MALARIA OUTBREAK INTELLIGENCE ENGINE - EXECUTIVE REPORT
====================================================
Generated: ${new Date().toLocaleString()}
Target Location: ${loc.address || 'N/A'}
Coordinates: Lat ${loc.lat ?? 'N/A'}, Lon ${loc.lon ?? 'N/A'}
Elevation: ${loc.elevation ? loc.elevation + 'm' : 'N/A'}

ENVIRONMENTAL SUMMARY METRICS:
----------------------------------------------------
Average Temperature: ${metrics.Temperature ? metrics.Temperature.toFixed(1) + ' °F' : 'N/A'}
Average Relative Humidity: ${metrics.Humidity ? metrics.Humidity.toFixed(1) + ' %' : 'N/A'}
Accumulated Rain: ${metrics.Accumulated_Rain ? metrics.Accumulated_Rain.toFixed(2) + ' in' : 'N/A'}

EPIDEMIOLOGICAL ASSESSMENT:
----------------------------------------------------
Peak Outbreak Risk Index: ${asm.max_future_risk ? asm.max_future_risk.toFixed(1) + '%' : 'N/A'}
Alert Threshold Set: ${globalThresholdValue}%
Status: ${(asm.max_future_risk ?? 0) >= globalThresholdValue ? 'HIGH TRANSMISSION RISK ALERT' : 'STABLE / LOW RISK'}

DATA PIPELINE METADATA:
----------------------------------------------------
Data Source Mode: ${meta.data_source_mode || 'API Live Telemetry'}
Pipeline Execution Time: ${meta.execution_timestamp || new Date().toISOString()}
====================================================`;

            const blob = new Blob([reportContent], { type: 'text/plain;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            const safeName = (loc.address || 'Location').replace(/[^a-zA-Z0-9]/g, '_');
            link.download = `Malaria_Risk_Report_${safeName}.txt`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        function showErrorMessage(message) {
            const container = document.getElementById('explanatoryReasonsContainer');
            if (container) {
                container.innerHTML = `
                    <div class="p-3 bg-red-50 border border-red-200 rounded-lg text-red-700 text-xs font-medium">
                        ⚠️ ${message}
                    </div>`;
            }
        }
    </script>
</body>
</html>
